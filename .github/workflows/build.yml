name: Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    
    - name: Build
      run: msbuild CybersecurityChatbot.csproj /p:Configuration=Release /p:TargetFrameworkVersion=v4.8
