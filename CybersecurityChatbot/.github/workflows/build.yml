name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest  # Must be Windows for .NET Framework

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet packages
      run: nuget restore CybersecurityChatbot.sln

    - name: Build solution
      run: msbuild CybersecurityChatbot.sln /p:Configuration=Release

    - name: Check if files exist
      run: |
        if (Test-Path "Audio\Greeting.wav") {
          Write-Host "✅ Audio file found"
        } else {
          Write-Host "⚠️ Warning: greeting.wav not found in Audio folder"
        }G